<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jeju Family Adventure</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jeju Trip">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --blue:      #1565C0;
  --blue-mid:  #1976D2;
  --blue-lt:   #42A5F5;
  --sky:       #E3F2FD;
  --teal:      #00897B;
  --coral:     #EF5350;
  --amber:     #FFA000;
  --green:     #43A047;
  --purple:    #7E57C2;
  --white:     #FFFFFF;
  --cream:     #F5F9FF;
  --text:      #1a2340;
  --text-mid:  #3d5a80;
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bot:  env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; overflow: hidden; background: var(--blue); font-family: 'DM Sans', sans-serif; color: var(--text); }

/* ─── SPLASH ─── */
#splash {
  position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(160deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }

.splash-plane {
  font-size: 72px; margin-bottom: 8px;
  animation: flyIn 1s cubic-bezier(.34,1.56,.64,1) both;
  display: inline-block;
}
@keyframes flyIn {
  from { transform: translate(-80px, 40px) scale(0.5) rotate(-20deg); opacity: 0; }
  to   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
}
.splash-title {
  font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 900;
  color: white; text-align: center; margin-bottom: 4px;
  animation: fadeUp 0.7s 0.5s both;
}
.splash-dest {
  font-size: 16px; color: rgba(255,255,255,0.7); letter-spacing: 3px;
  text-transform: uppercase; text-align: center; margin-bottom: 8px;
  animation: fadeUp 0.7s 0.7s both;
}
.splash-dates {
  font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 28px;
  animation: fadeUp 0.7s 0.85s both;
}
.splash-crew {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  animation: fadeUp 0.7s 1s both;
}
.splash-badge {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 6px 14px; font-size: 12px; color: rgba(255,255,255,0.85);
}
.splash-dots { margin-top: 40px; display: flex; gap: 7px; animation: fadeUp 0.7s 1.3s both; }
.splash-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); animation: pulse 1.4s infinite; }
.splash-dot:nth-child(2) { animation-delay: 0.2s; } .splash-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ─── APP SHELL ─── */
#app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--cream); opacity: 0; transition: opacity 0.5s ease 0.3s; }
#app.visible { opacity: 1; }

/* ─── HEADER ─── */
#header {
  background: linear-gradient(135deg, #0D47A1 0%, #1565C0 60%, #1976D2 100%);
  padding: calc(var(--safe-top) + 14px) 16px 14px; flex-shrink: 0; position: relative; overflow: hidden;
}
#header::before {
  content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; border-radius:50%;
  background: radial-gradient(circle, rgba(66,165,245,0.2) 0%, transparent 70%);
}
.header-inner { position: relative; z-index: 1; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-left { display: flex; align-items: center; gap: 8px; }
.header-plane { font-size: 28px; }
.header-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: white; line-height: 1; }
.header-sub { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
.header-flag { font-size: 22px; }

/* Zone pill */
.zone-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.12); border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.7);
  letter-spacing: 0.5px; margin-bottom: 10px;
}

/* Day strip */
.day-strip { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; scroll-snap-type: x mandatory; }
.day-strip::-webkit-scrollbar { display: none; }
.day-chip {
  flex-shrink: 0; scroll-snap-align: start;
  background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px; padding: 7px 12px; cursor: pointer;
  touch-action: manipulation; user-select: none; transition: all 0.2s; text-align: center; min-width: 56px;
}
.day-chip.active { background: white; border-color: white; }
.day-chip-label { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; display: block; }
.day-chip.active .day-chip-label { color: var(--blue); }
.day-chip-num { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: white; display: block; line-height: 1.1; }
.day-chip.active .day-chip-num { color: var(--blue); }
.day-chip-dow { font-size: 9px; color: rgba(255,255,255,0.4); display: block; }
.day-chip.active .day-chip-dow { color: var(--blue-mid); }

/* ─── CONTENT ─── */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 80px); }

/* ─── DAY HERO ─── */
.day-hero {
  background: linear-gradient(150deg, #0D47A1 0%, #1565C0 55%, #1976D2 100%);
  padding: 22px 18px 20px; position: relative; overflow: hidden;
}
.day-hero::after {
  content: ''; position: absolute; bottom: -25px; right: -25px;
  width: 100px; height: 100px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.08);
}
.hero-row { display: flex; align-items: flex-start; justify-content: space-between; }
.hero-left { flex: 1; }
.hero-day { font-size: 10px; color: var(--blue-lt); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 3px; }
.hero-dest { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: white; line-height: 1.1; margin-bottom: 4px; }
.hero-date { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
.hero-zone {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px; padding: 5px 12px; font-size: 12px; color: rgba(255,255,255,0.8);
}
.hero-emoji { font-size: 38px; align-self: center; margin-left: 10px; }

/* ─── SECTION CARDS ─── */
.section-card { margin: 10px 14px 0; background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 12px rgba(21,101,192,0.08); }
.section-header {
  display: flex; align-items: center; gap: 10px; padding: 13px 15px;
  cursor: pointer; touch-action: manipulation; user-select: none; background: white; transition: background 0.15s;
}
.section-header:active { background: #f0f6ff; }
.section-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.si-hotel  { background: linear-gradient(135deg,#E3F2FD,#BBDEFB); }
.si-todo   { background: linear-gradient(135deg,#FFF3E0,#FFE0B2); }
.si-opt    { background: linear-gradient(135deg,#EDE7F6,#D1C4E9); }
.si-food   { background: linear-gradient(135deg,#E8F5E9,#C8E6C9); }
.section-label { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1.2px; }
.section-caret { font-size: 10px; color: #ccc; transition: transform 0.25s; }
.section-card.open .section-caret { transform: rotate(180deg); }
.section-body { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.section-card.open .section-body { max-height: 4000px; border-top: 1px solid #f0f4ff; }

/* Hotel */
.hotel-block { padding: 15px; }
.hotel-name { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 5px; }
.hotel-addr { font-size: 12px; color: #999; line-height: 1.5; margin-bottom: 14px; }
.btn-row { display: flex; gap: 8px; }
.action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 10px 10px; border-radius: 12px; border: none; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; touch-action: manipulation; user-select: none;
  text-decoration: none; transition: transform 0.15s, opacity 0.15s;
}
.action-btn:active { transform: scale(0.96); opacity: 0.85; }
.btn-apple { background: var(--blue); color: white; }
.btn-google { background: var(--amber); color: #3E2000; }

/* Todo list */
.todo-list { padding: 10px 15px 14px; }
.todo-item { display: flex; align-items: flex-start; gap: 11px; padding: 10px 0; border-bottom: 1px solid #f5f7ff; }
.todo-item:last-child { border-bottom: none; }
.todo-num { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; }
.todo-num.main { background: var(--blue); color: white; }
.todo-num.opt  { background: #EDE7F6; color: #7E57C2; }
.todo-text { font-size: 14px; line-height: 1.55; color: var(--text); }

/* Restaurant */
.rest-block { padding: 15px; }
.rest-name { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 5px; }
.rest-addr { font-size: 12px; color: #999; line-height: 1.5; margin-bottom: 14px; }

/* ─── RICH ACTIVITY CARDS ─── */
.activity-list { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 10px; }
.activity-card {
  border-radius: 14px; border: 1px solid #EEF2FF; overflow: hidden;
  background: #FAFBFF;
}
.activity-card-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 13px 10px;
}
.activity-emoji { font-size: 22px; flex-shrink: 0; }
.activity-name-wrap { flex: 1; }
.activity-name { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); line-height: 1.2; }
.activity-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  padding: 2px 8px; border-radius: 20px;
}
.badge-baby    { background: #E3F2FD; color: #1565C0; }
.badge-elderly { background: #FFF3E0; color: #E65100; }
.badge-active  { background: #E8F5E9; color: #2E7D32; }
.badge-opt     { background: #F3E5F5; color: #6A1B9A; }
.activity-desc {
  font-size: 13px; line-height: 1.6; color: #555;
  padding: 0 13px 10px; border-top: 1px solid #EEF2FF; padding-top: 9px;
}
.activity-addr {
  font-size: 11px; color: #aaa; line-height: 1.5;
  padding: 0 13px 10px;
}
.activity-map-btn {
  display: flex; align-items: center; gap: 6px;
  margin: 0 13px 12px;
  background: var(--blue); color: white;
  border-radius: 10px; padding: 8px 12px;
  font-size: 12px; font-weight: 600; text-decoration: none;
  touch-action: manipulation; width: fit-content;
  transition: opacity 0.15s;
}
.activity-map-btn:active { opacity: 0.8; }
.activity-map-btn.green { background: var(--teal); }

/* Rich restaurant card */
.rest-rich { padding: 14px; }
.rest-rich-name { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
.rest-cuisine { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.rest-desc { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px; }
.rest-order-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--teal); margin-bottom: 6px; }
.rest-order-items { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.rest-order-pill { background: #E0F2F1; color: #00695C; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
.rest-addr-row { font-size: 12px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }

/* ─── RESTAURANT SECTION ─── */
.meal-tabs {
  display: flex; gap: 0; padding: 12px 14px 0;
}
.meal-tab {
  flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 700;
  color: #bbb; border-bottom: 2px solid #eee; cursor: pointer;
  touch-action: manipulation; user-select: none; transition: all 0.2s; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.meal-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

.meal-panel { display: none; padding: 10px 14px 14px; }
.meal-panel.active { display: flex; flex-direction: column; gap: 10px; }

/* AI recommended restaurant card */
.rcard {
  border-radius: 14px; border: 1.5px solid #E8F0FE; overflow: hidden;
  background: white; box-shadow: 0 1px 6px rgba(21,101,192,0.06);
}
.rcard.friends {
  border-color: #FFD54F; background: #FFFDE7;
  box-shadow: 0 1px 8px rgba(255,193,7,0.15);
}

.rcard-header { padding: 12px 13px 8px; display: flex; align-items: flex-start; gap: 10px; }
.rcard-emoji { font-size: 26px; flex-shrink: 0; margin-top: 1px; }
.rcard-meta { flex: 1; }
.rcard-name { font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
.rcard-cuisine { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.rcard-source {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px;
  letter-spacing: 0.3px;
}
.rcard-source.ai { background: #EDE7F6; color: #6A1B9A; }
.rcard-source.friends { background: #FFF8E1; color: #E65100; border: 1px solid #FFD54F; }

.rcard-desc { font-size: 13px; color: #555; line-height: 1.6; padding: 0 13px 10px; border-top: 1px solid #f0f0f0; padding-top: 9px; }
.rcard.friends .rcard-desc { border-top-color: #FFE082; }

.rcard-dishes-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--teal); margin: 0 13px 6px; }
.rcard-dishes { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 13px 10px; }
.rcard-dish { background: #E0F2F1; color: #00695C; border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
.rcard.friends .rcard-dish { background: #FFF3E0; color: #BF360C; }

.rcard-addr { font-size: 11px; color: #bbb; padding: 0 13px 8px; }
.rcard-btns { display: flex; gap: 7px; padding: 0 13px 13px; flex-wrap: wrap; }
.rcard-map-btn {
  display: flex; align-items: center; gap: 5px; border-radius: 10px;
  padding: 7px 12px; font-size: 12px; font-weight: 600; text-decoration: none;
  touch-action: manipulation; transition: opacity 0.15s; flex-shrink: 0;
}
.rcard-map-btn:active { opacity: 0.8; }
.rcard-map-btn.apple { background: var(--blue); color: white; }
.rcard-map-btn.google { background: var(--teal); color: white; }
.rcard-map-btn.naver { background: #03C75A; color: white; }
.activity-map-btn.naver { background: #03C75A; }
.action-btn.btn-naver { background: #03C75A; color: white; }

/* Tips banner */
.tips-banner {
  margin: 10px 14px 0; border-radius: 16px; padding: 14px 15px;
  background: linear-gradient(135deg, #FFF8E1, #FFF3CD);
  border: 1px solid rgba(255,160,0,0.2);
}
.tips-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--amber); font-weight: 700; margin-bottom: 9px; }
.tips-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.tip-pill { background: white; border: 1px solid #ffe0a0; border-radius: 20px; padding: 5px 11px; font-size: 12px; color: #555; display: flex; align-items: center; gap: 4px; }

/* Flight day */
.flight-card {
  margin: 10px 14px; border-radius: 18px; overflow: hidden;
  background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
  border: 1px solid rgba(67,160,71,0.2); padding: 22px 18px; text-align: center;
}
.flight-plane { font-size: 48px; margin-bottom: 8px; animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.flight-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; color: #2E7D32; margin-bottom: 4px; }
.flight-sub { font-size: 14px; color: #43A047; }
.flight-badges { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
.flight-badge { background: white; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #43A047; font-weight: 500; }

/* ─── OVERVIEW SCREEN ─── */
.overview-hero {
  background: linear-gradient(155deg, #0D47A1 0%, #1565C0 100%);
  padding: calc(var(--safe-top) + 18px) 18px 22px; flex-shrink: 0; position: relative; overflow: hidden;
}
.overview-hero::before {
  content:''; position:absolute; top:-50px; right:-50px; width:160px; height:160px; border-radius:50%;
  background: radial-gradient(circle, rgba(66,165,245,0.2) 0%, transparent 70%);
}
.ov-title { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: white; margin-bottom: 3px; }
.ov-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 14px; }
.ov-crew { display: flex; gap: 7px; flex-wrap: wrap; }
.crew-badge { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 11px; font-size: 12px; color: rgba(255,255,255,0.8); }

.ov-list { padding: 10px 14px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 90px; }
.ov-card {
  background: white; border-radius: 16px; margin-bottom: 8px; overflow: hidden;
  box-shadow: 0 2px 10px rgba(21,101,192,0.07); display: flex; align-items: stretch;
  cursor: pointer; touch-action: manipulation; user-select: none; transition: transform 0.15s;
}
.ov-card:active { transform: scale(0.985); }
.ov-stripe { width: 5px; flex-shrink: 0; }
.ov-inner { padding: 12px 12px 12px 11px; flex: 1; }
.ov-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.ov-day-num { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--blue-mid); text-transform: uppercase; }
.ov-date { font-size: 10px; color: #bbb; }
.ov-dest { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.ov-hotel { font-size: 11px; color: #aaa; }
.ov-zone-dot { width: 7px; height: 7px; border-radius: 50%; margin-left: auto; flex-shrink: 0; align-self: center; margin-right: 2px; }
.ov-arrow { display: flex; align-items: center; padding: 0 13px 0 0; font-size: 14px; color: #ddd; }

/* ─── PACKING ─── */
.pack-hero {
  background: linear-gradient(155deg, #0D47A1 0%, #1565C0 100%);
  padding: calc(var(--safe-top) + 18px) 18px 22px; flex-shrink: 0;
}
.pack-title { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; color: white; margin-bottom: 3px; }
.pack-sub { font-size: 12px; color: rgba(255,255,255,0.5); }
.pack-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px calc(var(--safe-bot) + 80px); }
.pack-cat { background: white; border-radius: 16px; margin-bottom: 9px; overflow: hidden; box-shadow: 0 2px 10px rgba(21,101,192,0.07); }
.pack-cat-hdr {
  display: flex; align-items: center; gap: 10px; padding: 13px 15px;
  cursor: pointer; touch-action: manipulation; user-select: none; background: white;
}
.pack-cat-icon { font-size: 22px; }
.pack-cat-name { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
.pack-cat-count { font-size: 11px; color: #bbb; }
.pack-cat-caret { font-size: 10px; color: #ddd; transition: transform 0.25s; }
.pack-cat.open .pack-cat-caret { transform: rotate(180deg); }

function renderDayStrip() {
  var html = '';
  TRIP.days.forEach(function(d, i) {
    html += '<div class="day-chip' + (i===currentDay?' active':'') + '" data-day="'+i+'">' +
      '<span class="day-chip-label">Day</span>' +
      '<span class="day-chip-num">' + d.day + '</span>' +
      '<span class="day-chip-dow">' + d.dow + '</span>' +
    '</div>';
  });
  document.getElementById('dayStrip').innerHTML = html;
}

function renderRestaurants(restaurants) {
  if (!restaurants) return '<div style="padding:14px;font-size:13px;color:#bbb;">No restaurant recommendations for this day.</div>';

  var meals = [];
  if (restaurants.breakfast && restaurants.breakfast.length) meals.push({ key:'breakfast', label:'🌅 Breakfast', data: restaurants.breakfast });
  if (restaurants.lunch    && restaurants.lunch.length)    meals.push({ key:'lunch',     label:'☀️ Lunch',     data: restaurants.lunch });
  if (restaurants.dinner   && restaurants.dinner.length)   meals.push({ key:'dinner',    label:'🌙 Dinner',    data: restaurants.dinner });

  if (meals.length === 0) return '<div style="padding:14px;font-size:13px;color:#bbb;">No restaurant recommendations for this day.</div>';

  var tabsHtml = '<div class="meal-tabs">';
  meals.forEach(function(m, i) {
    tabsHtml += '<div class="meal-tab' + (i===0?' active':'') + '" data-meal="'+m.key+'">'+m.label+'</div>';
  });
  tabsHtml += '</div>';

  var panelsHtml = '';
  meals.forEach(function(m, i) {
    panelsHtml += '<div class="meal-panel' + (i===0?' active':'') + '" data-panel="'+m.key+'">';
    m.data.forEach(function(r) {
      var isFriends = r.source === 'friends';
      var mq = encodeURIComponent(r.mapQuery);
      var sourceHtml = isFriends
        ? '<span class="rcard-source friends">❤️ Friends & Family</span>'
        : '<span class="rcard-source ai">✦ AI Recommended</span>';
      var dishesHtml = '';
      if (r.dishes && r.dishes.length) {
        dishesHtml = '<div class="rcard-dishes-label">🍴 Must Try</div><div class="rcard-dishes">';
        r.dishes.forEach(function(d) { dishesHtml += '<span class="rcard-dish">'+d+'</span>'; });
        dishesHtml += '</div>';
      }
      panelsHtml +=
        '<div class="rcard' + (isFriends?' friends':'') + '">' +
          '<div class="rcard-header">' +
            '<div class="rcard-emoji">'+r.emoji+'</div>' +
            '<div class="rcard-meta">' +
              '<div class="rcard-name">'+r.name+'</div>' +
              '<div class="rcard-cuisine">'+r.cuisine+'</div>' +
              sourceHtml +
            '</div>' +
          '</div>' +
          '<div class="rcard-desc">'+r.desc+'</div>' +
          dishesHtml +
          '<div class="rcard-addr">📍 '+r.address+(r.phone?' · 📞 '+r.phone:'')+'</div>' +
          '<div class="rcard-btns">' +
            '<a class="rcard-map-btn apple" href="https://maps.apple.com/?q='+mq+'" target="_blank">🗺️ Apple</a>' +
            '<a class="rcard-map-btn google" href="https://maps.google.com/maps?q='+mq+'" target="_blank">📍 Google</a>' +
            '<a class="rcard-map-btn naver" href="https://map.naver.com/p/search/'+encodeURIComponent(r.address+' '+r.name)+'" target="_blank">🟢 Naver</a>' +
          '</div>' +
        '</div>';
    });
    panelsHtml += '</div>';
  });

  return tabsHtml + panelsHtml;
}

function renderActivityCards(items, isOpt) {
  if (!items || items.length === 0) {
    return '<div style="padding:14px 15px;font-size:13px;color:#bbb;">None for this day.</div>';
  }
  var html = '<div class="activity-list">';
  items.forEach(function(item) {
    var mq = encodeURIComponent(item.mapQuery);
    var appleUrl = 'https://maps.apple.com/?q=' + mq;
    var googleUrl = 'https://maps.google.com/maps?q=' + mq;

    var badgesHtml = '';
    if (item.tags) {
      item.tags.forEach(function(t) {
        if (t === 'baby')    badgesHtml += '<span class="badge badge-baby">👶 Baby-friendly</span>';
        if (t === 'elderly') badgesHtml += '<span class="badge badge-elderly">👴 Elderly-friendly</span>';
        if (t === 'active')  badgesHtml += '<span class="badge badge-active">🥾 Active</span>';
      });
    }
    if (isOpt) badgesHtml += '<span class="badge badge-opt">✦ Optional</span>';

    var naverUrl = 'https://map.naver.com/p/search/' + encodeURIComponent((item.address || '') + ' ' + item.mapQuery);
    html +=
      '<div class="activity-card">' +
        '<div class="activity-card-header">' +
          '<div class="activity-emoji">' + item.emoji + '</div>' +
          '<div class="activity-name-wrap">' +
            '<div class="activity-name">' + item.name + '</div>' +
            (badgesHtml ? '<div class="activity-badges">' + badgesHtml + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="activity-desc">' + item.desc + '</div>' +
        (item.address ? '<div class="activity-addr">📍 ' + item.address + '</div>' : '') +
        '<div style="display:flex;gap:7px;padding:0 13px 12px;flex-wrap:wrap;">' +
          '<a class="activity-map-btn" href="' + appleUrl + '" target="_blank">🗺️ Apple</a>' +
          '<a class="activity-map-btn green" href="' + googleUrl + '" target="_blank">📍 Google</a>' +
          '<a class="activity-map-btn naver" href="' + naverUrl + '" target="_blank">🟢 Naver</a>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

function renderDayContent(idx) {
  var d = TRIP.days[idx];

  // Flight day
  if (d.zone === 'flight') {
    var html = '<div class="flight-card animate-in">' +
      '<div class="flight-plane">✈️</div>' +
      '<div class="flight-title">Time to Fly Home!</div>' +
      '<div class="flight-sub">' + d.date + ' · Jeju → Singapore</div>' +
      '<div class="flight-badges">';
    d.tips.forEach(function(t) { html += '<div class="flight-badge">💡 ' + t + '</div>'; });
    html += '</div></div>' +
      '<div class="tips-banner animate-in">' +
        '<div class="tips-title">🇰🇷 Annyeong Jeju!</div>' +
        '<div class="tips-pills">' +
          '<div class="tip-pill">✈️ Jeju International Airport</div>' +
          '<div class="tip-pill">🕐 Allow extra time with baby</div>' +
          '<div class="tip-pill">🛍️ Duty free treats!</div>' +
        '</div>' +
      '</div>';
    document.getElementById('dayContent').innerHTML = html;
    document.getElementById('dayContent').parentElement.scrollTop = 0;
    return;
  }

  var mq = encodeURIComponent(d.hotelAddress);
  var zoneLabel = d.zone === 'south' ? '🌊 South Jeju' : '🌿 North Jeju';

  var tipsHtml = '';
  if (d.tips && d.tips.length) {
    tipsHtml = '<div class="tips-banner animate-in"><div class="tips-title">✨ Tips for your crew</div><div class="tips-pills">';
    d.tips.forEach(function(t) { tipsHtml += '<div class="tip-pill">💡 ' + t + '</div>'; });
    tipsHtml += '</div></div>';
  }

  var hotelSection = d.hotel ? (
    '<div class="section-card animate-in" data-section="hotel">' +
    '<div class="section-header">' +
      '<div class="section-icon si-hotel">🏨</div>' +
      '<div class="section-label">Hotel</div>' +
      '<div class="section-caret">▼</div>' +
    '</div>' +
    '<div class="section-body">' +
      '<div class="hotel-block">' +
        '<div class="hotel-name">' + d.hotel + '</div>' +
        '<div class="hotel-addr">📍 ' + d.hotelAddress + '</div>' +
        '<div class="btn-row">' +
          '<a class="action-btn btn-apple" href="https://maps.apple.com/?q='+mq+'" target="_blank">🗺️ Apple</a>' +
          '<a class="action-btn btn-google" href="https://maps.google.com/maps?daddr='+mq+'" target="_blank">📍 Google</a>' +
          '<a class="action-btn btn-naver" href="https://map.naver.com/p/search/'+encodeURIComponent(d.hotel+' '+d.hotelAddress)+'" target="_blank">🟢 Naver</a>' +
        '</div>' +
      '</div>' +
    '</div></div>'
  ) : '';

  var restSection =
    '<div class="section-card animate-in" data-section="food">' +
    '<div class="section-header">' +
      '<div class="section-icon si-food">🍽️</div>' +
      '<div class="section-label">Where to Eat</div>' +
      '<div class="section-caret">▼</div>' +
    '</div>' +
    '<div class="section-body">' + renderRestaurants(d.restaurants) + '</div>' +
    '</div>';

  // keep legacy single restaurant block if present
  if (d.restaurant) {
    var r = d.restaurant;
    var rmq = encodeURIComponent(r.mapQuery);
    var mustOrderHtml = '';
    if (r.mustOrder && r.mustOrder.length) {
      mustOrderHtml = '<div class="rest-order-label">🍴 Must Order</div><div class="rest-order-items">';
      r.mustOrder.forEach(function(m) { mustOrderHtml += '<span class="rest-order-pill">' + m + '</span>'; });
      mustOrderHtml += '</div>';
    }
  }

  var html =
    '<div class="day-hero animate-in">' +
      '<div class="hero-row">' +
        '<div class="hero-left">' +
          '<div class="hero-day">Day ' + d.day + ' · ' + d.date + '</div>' +
          '<div class="hero-dest">' + d.to + '</div>' +
          '<div class="hero-date">' + zoneLabel + '</div>' +
          '<div class="hero-zone">🚗 Driving · Rented Car</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    tipsHtml +
    hotelSection +
    '<div class="section-card animate-in" data-section="todo">' +
      '<div class="section-header">' +
        '<div class="section-icon si-todo">⭐</div>' +
        '<div class="section-label">Things To Do</div>' +
        '<div class="section-caret">▼</div>' +
      '</div>' +
      '<div class="section-body">' + renderActivityCards(d.thingsToDo, false) + '</div>' +
    '</div>' +
    (d.optionalThingsToDo && d.optionalThingsToDo.length > 0 ?
    '<div class="section-card animate-in" data-section="opt">' +
      '<div class="section-header">' +
        '<div class="section-icon si-opt">✨</div>' +
        '<div class="section-label">Optional Extras</div>' +
        '<div class="section-caret">▼</div>' +
      '</div>' +
      '<div class="section-body">' + renderActivityCards(d.optionalThingsToDo, true) + '</div>' +
    '</div>' : '') +
    restSection +
    '<div style="height:8px"></div>';

  document.getElementById('dayContent').innerHTML = html;
  document.getElementById('dayContent').parentElement.scrollTop = 0;
  setTimeout(function() {
    var first = document.querySelector('#dayContent .section-card');
    if (first) first.classList.add('open');
  }, 50);
}

function renderOverview() {
  var html = '';
  TRIP.days.forEach(function(d, i) {
    var color = ZONE_STRIPES[i] || '#1565C0';
    var hotelText = d.hotel ? '🏨 ' + d.hotel : (d.zone === 'flight' ? '✈️ Fly home day' : '');
    html += '<div class="ov-card" data-goto="'+i+'">' +
      '<div class="ov-stripe" style="background:'+color+'"></div>' +
      '<div class="ov-inner">' +
        '<div class="ov-meta">' +
          '<span class="ov-day-num">Day ' + d.day + '</span>' +
          '<span class="ov-date">· ' + d.date + '</span>' +
        '</div>' +
        '<div class="ov-dest">' + d.to + '</div>' +
        (hotelText ? '<div class="ov-hotel">' + hotelText + '</div>' : '') +
      '</div>' +
      '<div class="ov-arrow">›</div>' +
    '</div>';
  });
  document.getElementById('overviewList').innerHTML = html;
}

function renderPacking() {
  var html = '';
  PACKING.forEach(function(cat, ci) {
    var checked = 0;
    cat.items.forEach(function(item, ii) { if (packingState[ci+'_'+ii]) checked++; });
    html += '<div class="pack-cat" data-cat="'+ci+'">' +
      '<div class="pack-cat-hdr">' +
        '<span class="pack-cat-icon">'+cat.icon+'</span>' +
        '<span class="pack-cat-name">'+cat.category+'</span>' +
        '<span class="pack-cat-count">'+checked+'/'+cat.items.length+'</span>' +
        '<span class="pack-cat-caret">▼</span>' +
      '</div>' +
      '<div class="pack-items-body">';
    cat.items.forEach(function(item, ii) {
      var key = ci+'_'+ii;
      var chk = !!packingState[key];
      html += '<div class="pack-item'+(chk?' checked':'')+'" data-pack-key="'+key+'">' +
        '<div class="pack-check">'+(chk?'✓':'')+'</div>' +
        '<div class="pack-item-text">'+item.text+'</div>' +
        (item.tag ? '<span class="pack-item-tag">'+item.tag+'</span>' : '') +
      '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('packingContent').innerHTML = html;
}

function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var s = document.getElementById('screen-'+name);
  if (s) s.classList.add('active');
  var btn = document.querySelector('[data-screen="'+name+'"]');
  if (btn) btn.classList.add('active');
  if (name==='overview') renderOverview();
  if (name==='packing') renderPacking();
}

// ─── EVENT DELEGATION ───
document.getElementById('dayStrip').addEventListener('click', function(e) {
  var chip = e.target.closest('.day-chip');
  if (!chip) return;
  currentDay = parseInt(chip.getAttribute('data-day'));
  renderDayStrip();
  renderDayContent(currentDay);
});

document.getElementById('content').addEventListener('click', function(e) {
  // Meal tab switching
  var tab = e.target.closest('.meal-tab');
  if (tab) {
    var mealKey = tab.getAttribute('data-meal');
    var container = tab.closest('.section-body');
    container.querySelectorAll('.meal-tab').forEach(function(t) { t.classList.remove('active'); });
    container.querySelectorAll('.meal-panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    var panel = container.querySelector('[data-panel="'+mealKey+'"]');
    if (panel) panel.classList.add('active');
    return;
  }
  // Section card toggle
  var header = e.target.closest('.section-header');
  if (!header) return;
  var card = header.closest('.section-card');
  if (card) card.classList.toggle('open');
});

document.getElementById('bottom-nav').addEventListener('click', function(e) {
  var btn = e.target.closest('.nav-btn');
  if (!btn) return;
  var screen = btn.getAttribute('data-screen');
  if (screen) switchScreen(screen);
});

document.getElementById('overviewList').addEventListener('click', function(e) {
  var card = e.target.closest('.ov-card');
  if (!card) return;
  currentDay = parseInt(card.getAttribute('data-goto'));
  renderDayStrip();
  renderDayContent(currentDay);
  switchScreen('itinerary');
});

document.getElementById('packingContent').addEventListener('click', function(e) {
  var hdr = e.target.closest('.pack-cat-hdr');
  if (hdr) { hdr.closest('.pack-cat').classList.toggle('open'); return; }
  var item = e.target.closest('.pack-item');
  if (item) {
    var key = item.getAttribute('data-pack-key');
    packingState[key] = !packingState[key];
    savePacking();
    renderPacking();
  }
});

// ─── INIT ───
setTimeout(function() {
  var splash = document.getElementById('splash');
  splash.classList.add('fade-out');
  document.getElementById('app').classList.add('visible');
  setTimeout(function() { splash.style.display='none'; }, 900);
}, 2400);

renderDayStrip();
renderDayContent(currentDay);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  });
}
</script>
</body>
</html>
